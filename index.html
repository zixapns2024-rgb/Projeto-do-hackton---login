<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de login</title>

    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="Favicon do meu site.png" type="image/x-icon">
</head>
<body>
    <div class="tela-login">
        <h1>Login</h1>
        <form action="dashboard.html">
        <input type="text" placeholder="Nome" required> <!--placeholder - é o que fica dentro do input-->
        <input type="password" placeholder="Senha" required minlength="6"> <!--Esse "password" ele deixa os digitos "escondidos"-->
        <input type="email" placeholder="endereço e-mail" required>

             <button>Enviar</button>
        </form>
    </div>
</body>
</html>
