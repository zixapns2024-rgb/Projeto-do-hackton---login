<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./editar-aluno.js" defer></script>
    <title>Editar Aluno</title>

    <link rel="stylesheet" href="style3.css">
    <link rel="shortcut icon" href="favicon-projeto-lista-de-alunos.png" type="image/x-icon">

</head>
<body>

<div class="container">
    <h1>Editar Aluno</h1>

    <form id="form-editar-aluno">

        <div class="campo">
            <label>Matrícula</label>
            <input type="text" id="matricula" name="matricula" readonly>
        </div>

        <div class="campo">
            <label>Nome</label>
            <input type="text" id="nome" name="nome" required>
        </div>

        <div class="campo">
            <label>E-mail</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="campo">
            <label>Curso</label>
            <select id="curso" required>
                <option value="">Selecione</option>
                <option>Análise e Desenvolvimento de Sistemas</option>
                <option>Ciência da Computação</option>
                <option>Engenharia da Computação</option>
            </select>
        </div>

        <div class="botoes">
            <button type="submit" class="btn-cadastrar">Salvar alterações</button>
            <a href="alunos.html" class="btn-voltar">Cancelar</a>
        </div>

    </form>
</div>

</body>
</html>
