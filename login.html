<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./login.js" defer></script>
    <title>Tela de login</title>

    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="Favicon do meu site.png" type="image/x-icon">
</head>
<body>
    <div class="tela-login">
        <h1>Login</h1>
        <form method="post"> <!--Pra onde os dados vão no backend"-->
        <input type="email" name="email" placeholder="Endereço de e-mail" required> <!--placeholder - é o que fica dentro do input-->
        <input type="password" name="senha" placeholder="Senha" required minlength="8"> <!--Esse "password" ele deixa os digitos "escondidos"-->
             <button type="submit">Entrar</button> <!--Esse "submit" envia o formulário-->
             <p><a href="cadastro.html">Não tem uma conta? Cadastre-se</a></p>
        </form>
    </div>
</body>
</html>
