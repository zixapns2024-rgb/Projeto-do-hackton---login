<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./alunos.js" defer></script>
    <title>Gestão de Alunos</title>

    <link rel="stylesheet" href="style2.css">
    <link rel="shortcut icon" href="Favicon do meu site.png" type="image/x-icon">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Sistema de Registro de Alunos</h1>
            <p>Plataforma Profissional de Gestão de Estudantes</p>
        </div>

        <div class="cards">
            <div class="card">
                <h2 id="total-alunos">0</h2>
                <p>Total de alunos</p>
            </div>

            <div class="card">
                <h2 id="total-cursos">0</h2>
                <p>Cursos ativos</p>
            </div>

            <div class="card">
                <h2 id="total-turmas">0</h2>
                <p>Turmas</p>
            </div>
        </div>

        <div class="add-aluno">
            <a href="cadastro-aluno.html" class="btn-add">
                Adicionar novo aluno
            </a>
        </div>

        <div class="aluno-area">
            <h2>Alunos registrados</h2>

            <div class="actions">
                <input type="text" id="busca-aluno" placeholder="Buscar por nome, e-mail ou Matrícula...">

                <select id="filtro-curso">
                    <option value="">Todos os cursos</option>
                    <option>Análise e Desenvolvimento de Sistemas</option>
                    <option>Ciência da Computação</option>
                    <option>Engenharia da Computação</option>
                </select>
            </div>

            <div class="tabela-area">
                <table>
                    <thead>
                        <tr>
                            <th>Matrícula (ID)</th>
                            <th>Nome</th>
                            <th>E-mail</th>
                            <th>Curso</th>
                            <th>Ações</th>
                        </tr>
                    </thead>

                    <tbody id="lista-alunos">
                        <!-- Exemplo da linha que depois vai vir do backend / JS -->
                         <!--
                         <tr>
                            <td>STU001</td>
                            <td>Nome Aluno</td>
                            <td>aluno@gmail.com</td>
                            <td>Análise e Desenvolvimento de Sistemas</td>
                            <td>
                                <a href="editar-aluno.html?id=STU001" class="btn-editar">Editar</a>
                                <button class="btn-excluir" data-id="STU001">Excluir</button>
                            </td>
                        </tr>
                    -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

</body>
</html>
