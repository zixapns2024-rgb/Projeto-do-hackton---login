<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Alunos</title>

    <link rel="stylesheet" href="style3.css">
    <link rel="shortcut icon" href="Favicon do meu site.png" type="image/x-icon">
</head>
<body>

    <div class="container">

        <div class="header">
            <h1>Cadastro de aluno</h1>
            <p>Preencha os dados para registrar um novo aluno</p>
        </div>

        <div class="form-area">
            <form action="/alunos" method="post">

                <div class="linha-form">
                    <div class="campo">
                        <label for="nome">Nome *</label>
                        <input type="text" id="nome" name="nome" placeholder="Digite o nome" required>
                    </div>

                    <div class="campo">
                        <label for="sobrenome">Sobrenome *</label>
                        <input type="text" id="sobrenome" name="sobrenome" placeholder="Digite o sobrenome" required>
                    </div>
                </div>

                <div class="linha-form">
                    <div class="campo">
                        <label for="email">E-mail *</label>
                        <input type="email" id="email" name="email" placeholder="aluno@exemplo.com" required>
                    </div>

                    <div class="campo">
                        <label for="telefone">Telefone *</label>
                        <input type="text" id="telefone" name="telefone" placeholder="(11) 98765-4321" required>
                    </div>
                </div>

                <div class="linha-form">
                    <div class="campo">
                        <label for="dataNascimento">Data de nascimento *</label>
                        <input type="date" id="dataNascimento" name="dataNascimento" required>
                    </div>

                    <div class="campo">
                        <label for="curso">Curso *</label>
                        <select id="curso" name="curso" required>
                            <option value="">Selecione um curso</option>
                            <option>Análise e Desenvolvimento de Sistemas</option>
                            <option>Ciência da Computação</option>
                            <option>Engenharia de Software</option>
                        </select>
                    </div>
                </div>

                <div class="linha-form">
                    <div class="campo">
                        <label for="dataMatricula">Data da matrícula *</label>
                        <input type="date" id="dataMatricula" name="dataMatricula" required>
                    </div>
                </div>

                <div class="botoes">
                    <a href="alunos.html" class="btn-salvar">Registrar aluno</button>
                    <a href="alunos.html" class="btn-voltar">Cancelar</a>
                </div>

            </form>
        </div>

    </div>

</body>
</html>
